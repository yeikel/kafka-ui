# Docs: https://github.com/gradle/actions/blob/main/docs/wrapper-validation.md
name: "Validate Gradle Wrapper"

on:
  push:
    paths:
      - gradle/wrapper/gradle-wrapper.jar
  pull_request:
    paths:
      - gradle/wrapper/gradle-wrapper.jar

jobs:
  validation:
    name: "Validate Gradle Wrapper"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # https://github.com/actions/checkout/releases/tag/v6.0.3
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # https://github.com/gradle/actions/releases/tag/v6.1.0
